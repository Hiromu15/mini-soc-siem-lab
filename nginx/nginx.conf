events {}

http {
    log_format mini_soc_json escape=json
        '{'
        '"timestamp":"$time_iso8601",'
        '"source":"nginx",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status_code":$status,'
        '"user_agent":"$http_user_agent",'
        '"request":"$request"'
        '}';

    access_log /var/log/nginx/access.log mini_soc_json;
    error_log /var/log/nginx/error.log warn;

    upstream vulnerable_web_app {
        server vulnerable-web-app:8000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://vulnerable_web_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

